<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png">
  <title>OneCall Movers Quote Demo</title>

  <style>
    /* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(15,23,42,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

/* HIDDEN STATE */
.hidden{
  display:none;
}

/* LOADER BOX */
.loader-box{
  background:white;
  padding:30px;
  border-radius:16px;
  text-align:center;
}

/* SPINNER */
.spinner{
  width:40px;
  height:40px;
  border:4px solid #e2e8f0;
  border-top:4px solid #0EA5E9;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
  margin-bottom:10px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* MODAL */
.modal{
  background:white;
  padding:30px;
  border-radius:16px;
  max-width:400px;
  width:90%;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(10px); }
  to{ opacity:1; transform:translateY(0); }
}
 :root{
  --bg:#F1F5F9;
  --panel:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --muted:#475569;

  --primary:#0084ffbe;
  --secondary:#0059ffbe;

  --shadow:0 10px 30px rgba(15,23,42,0.08);
}

/* GLOBAL */
body{
  margin:0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* PAGE WRAPPER */
.container{
  max-width: 500px;
  margin: 25px auto;
  background: var(--panel);
  padding: 20px;
  border-radius: 20px;
  border:5px solid var(--border);
  box-shadow: var(--shadow);
}

/* TITLE */
h1{
  text-align:center;
  font-size:42px;
  margin-bottom:5px;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h2{
  text-align:center;
  font-size:42px;
  margin-bottom:5px;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h3{
  text-align:center;
  font-size:20px;
  margin-bottom:5px;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  text-align:center;
  font-size:20px;
  margin-bottom:35px;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* FORM GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* INPUTS */
label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
  font-weight:500;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#F8FAFC;
  outline:none;
  transition:0.2s;
}

input:focus, select:focus, textarea:focus{
  border-color: var(--primary);
  box-shadow:0 0 0 3px rgba(14,165,233,0.15);
}

/* TEXTAREA */
textarea{
  min-height:50px;
  resize:vertical;
}

/* FULL WIDTH FIELD */
.full{
  grid-column: span 1;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  font-weight:700;
  cursor:pointer;
  box-shadow: var(--shadow);
  transition:0.25s;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

/* SECTION CARDS (optional grouping) */
.section-box{
  margin-top:20px;
  padding:18px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#FFFFFF;
}

/* RESPONSIVE */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
  .full{
    grid-column: span 1;
  }
}
  </style>
</head>


<body>

<div class="container">
<div style="text-align:center; margin-bottom:20px;">
  <img src="onecall_movers.jpg" alt="RA Movers Logo"
       style="max-width:160px; height:auto; display:block; margin:auto;">
</div>

<h3 style="margin-top:0;">Get Your Moving Quote in 10 Seconds</h3>
  <!-- ✅ FORM -->
  <form id="quoteForm">

    <div class="grid">

      <div>
        <label>Full Name</label>
        <input type="text" name="name" required>
      </div>

      <div>
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div>
        <label>Phone</label>
        <input type="tel" name="phone" required>
      </div>

      <div>
        <label>Move Type</label>
        <select name="move_type" required>
          <option value="">Select one...</option>
          <option>Unload or Loading only</option>
          <option>Complete move (Wrapping, Loading, Unloading, Assembling/Disassembling)</option>
          <option>Furniture transportation</option>
        </select>
      </div>

      <div>
        <label>Move Size</label>
        <select name="move_size" required>
          <option value="">Select one...</option>
          <option>1 or 2 pieces</option>
          <option>1 Bedroom</option>
          <option>2 Bedroom</option>
          <option>3 Bedroom</option>
          <option>4 Bedroom</option>
          <option>5+ Bedroom</option>
          <option>Office</option>
        </select>
      </div>

      <div>
        <label>Stairs (Flights)</label>
        <input type="number" name="stairs" required>
      </div>



      <div>
        <label>Own Truck?</label>
        <select name="truck" required>
          <option value="">Select one...</option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div>
        <label>Wrapping Needed?</label>
        <select name="wrapping" required>
          <option value="">Select one...</option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div>
        <label>Heavy Items</label>
        <select name="heavy_items">
          <option value="">Select one...</option>
          <option>Appliances</option>
          <option>Exercise Equipment</option>
          <option>Piano</option>
          <option>Safe</option>
          <option>Other</option>
        </select>
      </div>




      <div>
        <label>Move Date</label>
        <input type="date" name="date" required>
      </div>

   

    </div>

    <button type="submit">Send Quote</button>



  </form>
</div>

<!-- ✅ WEBHOOK SCRIPT -->
<script>
document.getElementById("quoteForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const data = {
    name: this.name.value,
    email: this.email.value,
    phone: this.phone.value,
    move_type: this.move_type.value,
    move_size: this.move_size.value,
    stairs: this.stairs.value,
    truck: this.truck.value,
    heavy_items: this.heavy_items.value,
    date: this.date.value,
  };

  // SHOW LOADING
  document.getElementById("loadingOverlay").classList.remove("hidden");

  try {

    const res = await fetch("https://n8n.srv1058135.hstgr.cloud/webhook/d16ac87e-7961-4f69-9a3b-e19545bd562b", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    console.log(result);
    const r = result[0];

    if (!res.ok) {
      alert("Quote calculation failed");
      return;
    }

    // FILL DATA
    document.getElementById("movers").innerText = r.movers;
    document.getElementById("hours").innerText = r.hours;
    document.getElementById("rate").innerText = r.rate;
    document.getElementById("labor").innerText = r.labor;
    document.getElementById("protection").innerText = r.protection;
    document.getElementById("low").innerText = r.low.toLocaleString();
    document.getElementById("high").innerText = r.high.toLocaleString();

    // HIDE LOADING
    document.getElementById("loadingOverlay").classList.add("hidden");

    // SHOW MODAL
    document.getElementById("resultModal").classList.remove("hidden");

  } catch(err) {

    document.getElementById("loadingOverlay").classList.add("hidden");
    alert("Network error");
    console.log(err);

  }

});
function closeModal(){
  document.getElementById("resultModal").classList.add("hidden");
}
</script>
<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="overlay hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Calculating your quote...</p>
  </div>
</div>

<!-- RESULT POPUP -->
<div id="resultModal" class="overlay hidden">
  <div class="modal">

    <h2>Your Instant Estimate</h2>

    <!-- 🔥 PRICE RANGE -->
    <h1 style="margin:10px 0; font-size:32px;">
      $<span id="low"></span> – $<span id="high"></span>
    </h1>

    <p style="color:#555; font-size:14px;">
      Based on your move details
    </p>

    <div class="section-box">

      <p><strong>Movers:</strong> <span id="movers"></span></p>
      <p><strong>Estimated Hours:</strong> <span id="hours"></span></p>
      <p><strong>Hourly Rate:</strong> $<span id="rate"></span>/hr</p>
      <p><strong>Labor:</strong> $<span id="labor"></span></p>
      <p><strong>Protection Plan:</strong> $<span id="protection"></span></p>

    </div>

    <!-- CTA BUTTONS -->
    <button style="margin-top:10px;">Book the Move</button>
    <button style="background:#0F172A; margin-top:8px;">Call Us</button>
    <button onclick="closeModal()" style="background:#e2e8f0; color:#0F172A; margin-top:8px;">
      Close
    </button>

  </div>
</div>
</div>
</body>
</html>

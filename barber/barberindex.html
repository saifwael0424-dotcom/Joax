<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدور | صالون الحلاقة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --card:    #1c1c1c;
      --border:  #2a2a2a;
      --gold:    #c8973a;
      --gold2:   #f0c060;
      --cream:   #f0e8d8;
      --muted:   #666;
      --red:     #c0392b;
      --green:   #27ae60;
      --text:    #e8e0d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Header ---- */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
    }

    .header-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 12px rgba(200,151,58,0.4));
    }

    header h1 {
      font-size: clamp(26px, 6vw, 38px);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 1px;
      line-height: 1.2;
    }

    header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ---- Status bar ---- */
    .status-bar {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .status-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .status-chip .chip-num {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      color: var(--gold);
    }

    .status-chip .chip-lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
    }

    .status-chip.serving-chip .chip-num { color: var(--red); }

    /* ---- Container ---- */
    .container {
      width: 100%;
      max-width: 480px;
      padding: 20px 20px 60px;
    }

    /* ---- Form card ---- */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
    }

    .form-card::after {
      content: '✂';
      position: absolute;
      left: 20px;
      bottom: 16px;
      font-size: 60px;
      opacity: 0.04;
      transform: rotate(45deg);
      pointer-events: none;
    }

    .form-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 4px;
    }

    .form-card .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      text-align: right;
    }

    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,151,58,0.12);
    }

    .field input::placeholder { color: #444; }

    .join-btn {
      width: 100%;
      padding: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0e0e0e;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .join-btn:hover  { opacity: 0.9; }
    .join-btn:active { transform: scale(0.98); }
    .join-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .err {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
    }

    /* ---- Confirmation ---- */
    .confirm-card {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 24px;
      margin-top: 16px;
      text-align: center;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ticket-wrap {
      background: var(--surface);
      border: 1px dashed var(--gold);
      border-radius: 12px;
      padding: 28px 20px;
      margin: 0 auto 20px;
      max-width: 220px;
      position: relative;
    }

    .ticket-wrap::before, .ticket-wrap::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: var(--bg);
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }
    .ticket-wrap::before { right: -10px; }
    .ticket-wrap::after  { left: -10px; }

    .ticket-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ticket-num {
      font-size: 88px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(200,151,58,0.3);
    }

    .confirm-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .confirm-ahead {
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .sms-note {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .rejoin-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 24px;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .rejoin-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ---- Live queue ---- */
    .live-section {
      margin-top: 24px;
    }

    .live-section h3 {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s infinite;
      display: inline-block;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
    }
    .pill.waiting  { background: #222; color: #888; border: 1px solid #333; }
    .pill.serving  { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); animation: blink 1.5s infinite; }
    .pill.done     { background: rgba(39,174,96,0.1); color: #2ecc71; border: 1px solid rgba(39,174,96,0.2); }
    .pill.skipped  { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; text-decoration: line-through; }

    /* ---- Footer links ---- */
    .foot-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }
    .foot-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .foot-links a:hover { color: var(--gold); }
  </style>
</head>
<body>

<header>
  <span class="header-icon">✂</span>
  <h1>نظام الأدوار</h1>
  <p>سجّل اسمك وانتظر دورك براحتك</p>
</header>

<div class="status-bar">
  <div class="status-chip">
    <div class="chip-num" id="waitingCount">—</div>
    <div class="chip-lbl">بيستنوا دلوقتي</div>
  </div>
  <div class="status-chip serving-chip">
    <div class="chip-num" id="servingNum">—</div>
    <div class="chip-lbl">اللي بيتخدم</div>
  </div>
</div>

<div class="container">

  <!-- Form -->
  <div class="form-card" id="joinForm">
    <h2>خد رقمك</h2>
    <p class="sub">ادخل بياناتك وهنبعتلك لما دورك يقرب</p>

    <div class="field">
      <label for="nameInput">الاسم</label>
      <input type="text" id="nameInput" placeholder="مثال: أحمد محمد" autocomplete="name" />
    </div>

    <div class="field">
      <label for="phoneInput">رقم التليفون</label>
      <input type="tel" id="phoneInput" placeholder="01xxxxxxxxx" autocomplete="tel" inputmode="numeric" />
    </div>

    <button class="join-btn" id="joinBtn" onclick="joinQueue()">
      خد رقمك ←
    </button>

    <p class="err" id="errMsg"></p>
  </div>

  <!-- Confirmation -->
  <div class="confirm-card" id="confirmCard">
    <div class="ticket-wrap">
      <div class="ticket-label">رقمك في الدور</div>
      <div class="ticket-num" id="confirmNum">—</div>
    </div>
    <div class="confirm-name" id="confirmName"></div>
    <div class="confirm-ahead" id="confirmAhead"></div>
    <div class="sms-note">📱 هنبعتلك رسالة لما دورك يقرب</div>
    <button class="rejoin-btn" onclick="resetForm()">← تسجيل شخص تاني</button>
  </div>

  <!-- Live queue -->
  <div class="live-section">
    <h3><span class="live-dot"></span> الأدوار دلوقتي</h3>
    <div class="pills" id="pillsContainer">
      <span style="color:var(--muted);font-size:13px">بيتحمل…</span>
    </div>
  </div>

  <div class="foot-links">
    <a href="dashboard.html">لوحة الحلاق</a>
    <a href="display.html">شاشة العرض</a>
  </div>

</div>

<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
  const SHOP = SUPABASE_CONFIG.shopId;

  async function loadState() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await db
      .from('queue_entries')
      .select('*')
      .eq('shop_id', SHOP)
      .gte('created_at', today + 'T00:00:00')
      .order('queue_number', { ascending: true });

    const entries = data || [];
    renderPills(entries);

    const waiting = entries.filter(e => e.status === 'waiting').length;
    const serving = entries.find(e => e.status === 'serving');
    document.getElementById('waitingCount').textContent = waiting;
    document.getElementById('servingNum').textContent = serving ? `#${serving.queue_number}` : '—';
  }

  function renderPills(entries) {
    const c = document.getElementById('pillsContainer');
    if (!entries.length) {
      c.innerHTML = '<span style="color:var(--muted);font-size:13px">الدور فاضي — كن الأول!</span>';
      return;
    }
    c.innerHTML = entries.map(e =>
      `<span class="pill ${e.status}">#${e.queue_number}${e.status === 'serving' ? ' ✂' : ''}</span>`
    ).join('');
  }

  async function joinQueue() {
    const name  = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();
    const err   = document.getElementById('errMsg');
    const btn   = document.getElementById('joinBtn');

    err.textContent = '';
    if (!name)           { err.textContent = 'من فضلك اكتب اسمك'; return; }
    if (phone.length < 8){ err.textContent = 'اكتب رقم تليفون صح'; return; }

    btn.disabled = true;
    btn.textContent = 'بيتسجل…';

    try {
      const { data: entry, error } = await db.rpc('join_queue', {
        p_name: name, p_phone: phone, p_shop_id: SHOP
      });
      if (error) throw error;

      const today = new Date().toISOString().split('T')[0];
      const { data: ahead } = await db
        .from('queue_entries')
        .select('id', { count: 'exact' })
        .eq('shop_id', SHOP).eq('status', 'waiting')
        .lt('queue_number', entry.queue_number)
        .gte('created_at', today + 'T00:00:00');

      const peopleAhead = ahead?.length ?? 0;

      await triggerNotification('customer_joined', {
        customer_name: name, phone,
        queue_number: entry.queue_number,
        people_ahead: peopleAhead, shop_id: SHOP
      });

      showConfirm(entry.queue_number, name, peopleAhead);
    } catch(e) {
      err.textContent = 'في مشكلة، حاول تاني';
      console.error(e);
      btn.disabled = false;
      btn.textContent = 'خد رقمك ←';
    }
  }

  function showConfirm(num, name, ahead) {
    document.getElementById('confirmNum').textContent  = num;
    document.getElementById('confirmName').textContent = `أهلاً ${name.split(' ')[0]}!`;
    document.getElementById('confirmAhead').textContent =
      ahead === 0
        ? '🎉 أنت الجاي! روح الصالون دلوقتي'
        : `فيه ${ahead} ${ahead === 1 ? 'واحد' : 'ناس'} قبلك`;
    document.getElementById('joinForm').style.display    = 'none';
    document.getElementById('confirmCard').style.display = 'block';
  }

  function resetForm() {
    document.getElementById('nameInput').value  = '';
    document.getElementById('phoneInput').value = '';
    document.getElementById('joinBtn').disabled = false;
    document.getElementById('joinBtn').textContent = 'خد رقمك ←';
    document.getElementById('errMsg').textContent  = '';
    document.getElementById('joinForm').style.display    = 'block';
    document.getElementById('confirmCard').style.display = 'none';
  }

  db.channel('queue-customer')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'queue_entries', filter: `shop_id=eq.${SHOP}` }, loadState)
    .subscribe();

  loadState();
</script>
</body>
</html>

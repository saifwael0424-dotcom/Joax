<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شاشة العرض | نظام الأدوار</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #080808;
      --gold:  #c8973a;
      --gold2: #f0c060;
      --cream: #f0e8d8;
      --muted: rgba(240,232,216,0.3);
      --red:   #c0392b;
      --green: #27ae60;
      --dim:   rgba(255,255,255,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Cairo', sans-serif;
      color: var(--cream);
      overflow: hidden;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .screen {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-rows: 68px 1fr 80px;
    }

    /* ---- Header ---- */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.4);
      position: relative;
    }

    .hdr::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }

    .hdr-brand {
      font-size: 20px;
      font-weight: 900;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 1px;
    }

    .hdr-live {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: livePulse 2s infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(39,174,96,0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(39,174,96,0); }
    }

    .hdr-clock {
      font-size: 24px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
      direction: ltr;
    }

    /* ---- Main panels ---- */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .panel-serving {
      background: radial-gradient(ellipse at center, rgba(200,151,58,0.06) 0%, transparent 70%);
      border-left: 1px solid rgba(255,255,255,0.04);
    }

    .panel-next {
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 70%);
    }

    /* decorative corner brackets */
    .panel-serving::before {
      content: '';
      position: absolute;
      top: 28px; right: 28px; bottom: 28px; left: 28px;
      border: 1px solid rgba(200,151,58,0.08);
      border-radius: 4px;
      pointer-events: none;
    }

    .p-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .panel-serving .p-label { color: var(--gold); }
    .panel-next .p-label    { color: var(--muted); }

    .p-divider {
      width: 40px; height: 2px;
      border-radius: 1px;
      margin: 0 auto 24px;
    }
    .panel-serving .p-divider { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
    .panel-next .p-divider    { background: rgba(255,255,255,0.08); }

    .big-num {
      font-weight: 900;
      line-height: 0.85;
      text-align: center;
      letter-spacing: -4px;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .panel-serving .big-num {
      font-size: clamp(110px, 20vw, 210px);
      color: var(--gold);
      text-shadow:
        0 0 60px rgba(200,151,58,0.25),
        0 0 120px rgba(200,151,58,0.1);
    }

    .panel-next .big-num {
      font-size: clamp(70px, 12vw, 130px);
      color: rgba(240,232,216,0.12);
    }

    .p-name {
      text-align: center;
      margin-top: 16px;
      font-weight: 700;
    }
    .panel-serving .p-name { font-size: clamp(18px, 3vw, 32px); color: var(--cream); }
    .panel-next .p-name    { font-size: clamp(14px, 2vw, 22px); color: var(--muted); }

    .empty-label {
      font-size: clamp(24px, 4vw, 48px);
      font-weight: 900;
      letter-spacing: 2px;
      opacity: 0.15;
      text-align: center;
    }

    /* ---- Footer strip ---- */
    .footer-strip {
      background: rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 16px;
      overflow: hidden;
    }

    .strip-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .strip-chips {
      display: flex;
      gap: 10px;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .strip-chips::-webkit-scrollbar { display: none; }

    .chip {
      font-size: 20px;
      font-weight: 900;
      padding: 4px 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
      transition: all 0.3s;
    }
    .chip.next-chip {
      color: var(--gold);
      border-color: rgba(200,151,58,0.25);
    }

    /* ---- Announcement ticker ---- */
    .ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 0;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      overflow: hidden;
      transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
    }
    .ticker.on { height: 60px; }

    /* ---- Flash animation ---- */
    @keyframes flashIn {
      0%   { opacity: 0; transform: scale(0.85); }
      60%  { opacity: 1; transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .flash { animation: flashIn 0.5s ease; }
  </style>
</head>
<body>

<div class="screen">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-brand">✂ نظام الأدوار</div>
    <div class="hdr-live"><span class="live-dot"></span> مباشر</div>
    <div class="hdr-clock" id="clock">--:--</div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Serving -->
    <div class="panel panel-serving">
      <div class="p-label">بيحلق دلوقتي</div>
      <div class="p-divider"></div>
      <div class="big-num" id="servNum">—</div>
      <div class="p-name" id="servName"></div>
    </div>

    <!-- Next -->
    <div class="panel panel-next">
      <div class="p-label">الجاي بعده</div>
      <div class="p-divider"></div>
      <div class="big-num" id="nextNum">—</div>
      <div class="p-name" id="nextName"></div>
    </div>

  </div>

  <!-- Footer strip -->
  <div class="footer-strip">
    <div class="strip-label">كمان بيستنوا ←</div>
    <div class="strip-chips" id="stripChips"></div>
  </div>

</div>

<!-- Ticker -->
<div class="ticker" id="ticker"></div>

<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
  const SHOP = SUPABASE_CONFIG.shopId;

  // Clock
  function tick() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
  }
  setInterval(tick, 1000);
  tick();

  let prevServId = null;

  async function loadQueue() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await db
      .from('queue_entries')
      .select('*')
      .eq('shop_id', SHOP)
      .gte('created_at', today + 'T00:00:00')
      .in('status', ['waiting', 'serving'])
      .order('queue_number', { ascending: true });

    render(data || []);
  }

  function render(entries) {
    const serving = entries.find(e => e.status === 'serving');
    const waiting = entries.filter(e => e.status === 'waiting');

    const sn = document.getElementById('servNum');
    const nm = document.getElementById('servName');
    const xn = document.getElementById('nextNum');
    const xm = document.getElementById('nextName');

    if (serving) {
      if (prevServId !== serving.id) {
        sn.classList.remove('flash');
        void sn.offsetWidth;
        sn.classList.add('flash');
        if (prevServId !== null) {
          showTicker(`📣 دور رقم ${serving.queue_number} — ${serving.customer_name.split(' ')[0]} تعالى!`);
        }
        prevServId = serving.id;
      }
      sn.textContent = serving.queue_number;
      nm.textContent = serving.customer_name;
    } else {
      sn.textContent = '—';
      nm.textContent = '';
    }

    if (waiting.length > 0) {
      xn.textContent = waiting[0].queue_number;
      xm.textContent = waiting[0].customer_name;
    } else {
      xn.textContent = '—';
      xm.textContent = '';
    }

    // Strip chips (skip first = "next")
    const chips = document.getElementById('stripChips');
    const rest = waiting.slice(1);
    if (!rest.length) {
      chips.innerHTML = '<span style="color:rgba(255,255,255,0.1);font-size:12px;letter-spacing:1px">محدش تاني</span>';
    } else {
      chips.innerHTML = rest.map((e, i) =>
        `<div class="chip${i === 0 ? ' next-chip' : ''}">#${e.queue_number}</div>`
      ).join('');
    }
  }

  let tickerTimer;
  function showTicker(msg) {
    const t = document.getElementById('ticker');
    t.textContent = msg;
    t.classList.add('on');
    clearTimeout(tickerTimer);
    tickerTimer = setTimeout(() => t.classList.remove('on'), 5000);
  }

  db.channel('q-display')
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'queue_entries', filter: `shop_id=eq.${SHOP}`
    }, loadQueue)
    .subscribe();

  loadQueue();
</script>
</body>
</html>

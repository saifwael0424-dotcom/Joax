<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png">
  <title> Ballastack Movers</title>

  <style>
   /* =========================
   ROOT THEME
========================= */
:root {
  --bg: #0b0f19;
  --panel: #111827;
  --border: #1f2937;

  --text: #ffffff;
  --muted: rgba(255,255,255,0.6);

  --primary: #ffc507;
  --secondary: #ffb800;

  --shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* =========================
   GLOBAL
========================= */
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* =========================
   CONTAINER
========================= */
.container {
  max-width: 520px;
  margin: 30px auto;
  background: var(--panel);
  padding: 24px;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

/* =========================
   TYPOGRAPHY
========================= */
h1, h2, h3 {
  text-align: center;
  margin: 10px 0;
  font-weight: 700;
  color: var(--text);
}

h2 {
  font-size: 28px;
}

h3 {
  font-size: 18px;
  color: var(--muted);
}

p {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

/* =========================
   GRID
========================= */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* =========================
   INPUTS
========================= */
label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  display: block;
}

input,
select,
textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0f172a;
  color: var(--text);
  outline: none;
  transition: 0.2s;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 197, 7, 0.15);
}

/* =========================
   BUTTON
========================= */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #000;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: var(--shadow);
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.95;
}

/* =========================
   SECTION BOX
========================= */
.section-box {
  margin-top: 18px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: #0f172a;
}

/* =========================
   OVERLAY + MODAL
========================= */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.hidden {
  display: none;
}

.modal {
  background: var(--panel);
  padding: 24px;
  border-radius: 16px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  border: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}

/* =========================
   LOADING
========================= */
.loader-box {
  background: var(--panel);
  padding: 24px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid var(--border);
}

.spinner {
  width: 38px;
  height: 38px;
  border: 3px solid #1f2937;
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
  </style>
</head>


<body>

<div class="container">
<div style="text-align:center; margin-bottom:20px;">
  <img src="ballastack.jpg" alt="ballastack"
       style="max-width:150px; max-height:150px; display:block; margin:auto;">
</div>

<h3 style="margin-top:0;">Get Your Moving Quote in 10 Seconds</h3>
  <!-- ✅ FORM -->
  <form id="quoteForm">

    <div class="grid">

      <div>
        <label>Full Name</label>
        <input type="text" name="name" required>
      </div>

      <div>
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div>
        <label>Phone</label>
        <input type="tel" name="phone" required>
      </div>

      <div>
        <label>Move Type</label>
        <select name="move_type" required>
          <option value="">Select one...</option>
          <option>Unload or Loading only</option>
          <option>Complete move (Wrapping, Loading, Unloading, Assembling/Disassembling)</option>
          <option>Furniture transportation</option>
        </select>
      </div>

      <div>
        <label>Move Size</label>
        <select name="move_size" required>
          <option value="">Select one...</option>
          <option>1 or 2 pieces</option>
          <option>1 Bedroom</option>
          <option>2 Bedroom</option>
          <option>3 Bedroom</option>
          <option>4 Bedroom</option>
          <option>5+ Bedroom</option>
          <option>Office</option>
        </select>
      </div>

      <div>
        <label>Stairs (Flights)</label>
        <input type="number" name="stairs" required>
      </div>



      <div>
        <label>Own Truck?</label>
        <select name="truck" required>
          <option value="">Select one...</option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div>
        <label>Wrapping Needed?</label>
        <select name="wrapping" required>
          <option value="">Select one...</option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div>
        <label>Heavy Items</label>
        <select name="heavy_items">
          <option value="">Select one...</option>
          <option>Appliances</option>
          <option>Exercise Equipment</option>
          <option>Piano</option>
          <option>Safe</option>
          <option>Other</option>
        </select>
      </div>




      <div>
        <label>Move Date</label>
        <input type="date" name="date" required>
      </div>

   

    </div>

    <button type="submit">Send Quote</button>



  </form>
</div>

<!-- ✅ WEBHOOK SCRIPT -->
<script>
document.getElementById("quoteForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const data = {
    name: this.name.value,
    email: this.email.value,
    phone: this.phone.value,
    move_type: this.move_type.value,
    move_size: this.move_size.value,
    stairs: this.stairs.value,
    truck: this.truck.value,
    heavy_items: this.heavy_items.value,
    date: this.date.value,
  };

  // SHOW LOADING
  document.getElementById("loadingOverlay").classList.remove("hidden");

  try {

    const res = await fetch("https://n8n.srv1058135.hstgr.cloud/webhook/4d9bed81-c797-49cf-8862-14bce85f05b4", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    console.log(result);
    const r = result[0];

    if (!res.ok) {
      alert("Quote calculation failed");
      return;
    }

    // FILL DATA
    document.getElementById("movers").innerText = r.movers;
    document.getElementById("hours").innerText = r.hours;
    document.getElementById("rate").innerText = r.rate;
    document.getElementById("labor").innerText = r.labor;
    document.getElementById("protection").innerText = r.protection;
    document.getElementById("low").innerText = r.low.toLocaleString();
    document.getElementById("high").innerText = r.high.toLocaleString();

    // HIDE LOADING
    document.getElementById("loadingOverlay").classList.add("hidden");

    // SHOW MODAL
    document.getElementById("resultModal").classList.remove("hidden");

  } catch(err) {

    document.getElementById("loadingOverlay").classList.add("hidden");
    alert("Network error");
    console.log(err);

  }

});
function closeModal(){
  document.getElementById("resultModal").classList.add("hidden");
}
</script>
<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="overlay hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Calculating your quote...</p>
  </div>
</div>

<!-- RESULT POPUP -->
<div id="resultModal" class="overlay hidden">
  <div class="modal">

    <h2>Your Instant Estimate</h2>

    <!-- 🔥 PRICE RANGE -->
    <h1 style="margin:10px 0; font-size:32px;">
      $<span id="low"></span> – $<span id="high"></span>
    </h1>

    <p style="color:#555; font-size:14px;">
      Based on your move details
    </p>

    <div class="section-box">

      <p><strong>Movers:</strong> <span id="movers"></span></p>
      <p><strong>Estimated Hours:</strong> <span id="hours"></span></p>
      <p><strong>Hourly Rate:</strong> $<span id="rate"></span>/hr</p>
      <p><strong>Labor:</strong> $<span id="labor"></span></p>
      <p><strong>Protection Plan:</strong> $<span id="protection"></span></p>

    </div>

    <!-- CTA BUTTONS -->
    <button style="margin-top:10px;">Book the Move</button>
    <button style="background:#ffe601; margin-top:8px;">Call Us</button>
    <button onclick="closeModal()" style="background:#e2e8f0; color:#0F172A; margin-top:8px;">
      Close
    </button>

  </div>
</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Smart Quote System</title>

<style>
body{
  font-family:Arial;
  background:#F1F5F9;
  margin:0;
}

.container{
  max-width:520px;
  margin:30px auto;
  background:#fff;
  padding:25px;
  border-radius:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

input,select{
  padding:12px;
  width:100%;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  background:#ff6600;
  color:#fff;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

#movingFields{
  grid-column:span 2;
}

#resultBox{
  margin-top:20px;
  padding:15px;
  border:1px solid #ddd;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Instant Quote</h2>

<form id="quoteForm">

<div class="grid">

<!-- SERVICE -->
<div>
<label>Service</label>
<select name="service" id="service" required>
<option value="">Select</option>
<option value="moving">Moving</option>
<option value="inhouse">In-House</option>
<option value="office">Office</option>
<option value="cleaning">Cleaning</option>
<option value="carpet">Carpet</option>
</select>
</div>

<!-- PAIRED MOVE -->
<div>
<label>Paired Move</label>
<select name="pairedMove" id="pairedMove">
<option value="false">No</option>
<option value="true">Yes (Add Moving)</option>
</select>
</div>

<!-- MOVING FIELDS -->
<div id="movingFields">

<label>Bedrooms / Size</label>
<select name="bedrooms">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4+</option>
</select>

<label>Flights</label>
<input type="number" name="flights" value="0">

<label>Heavy Items</label>
<input type="number" name="heavyItems" value="0">

<label>Wrap</label>
<input type="number" name="wrap" value="0">

</div>

<!-- CLEANING OPTIONS -->
<div id="cleaningFields" style="display:none; grid-column:span 2;">
<label>Cleaning Type</label>
<select name="cleaningType">
<option value="standard">Standard</option>
<option value="deep">Deep Clean</option>
</select>
</div>

<!-- COMMON -->
<div>
<label>Sunday</label>
<select name="sunday">
<option value="false">No</option>
<option value="true">Yes</option>
</select>
</div>

<div>
<label>Truck</label>
<select name="truck">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>

<div style="grid-column:span 2;">
<label>Email</label>
<input type="email" name="email" required>
</div>

</div>

<button type="submit">Get Quote</button>

</form>

<div id="resultBox"></div>

</div>

<script>

const service = document.getElementById("service");
const pairedMove = document.getElementById("pairedMove");
const movingFields = document.getElementById("movingFields");
const cleaningFields = document.getElementById("cleaningFields");
const resultBox = document.getElementById("resultBox");

function updateUI(){

  const isMoving =
    service.value === "moving" ||
    service.value === "inhouse" ||
    service.value === "office";

  const isCleaning = service.value === "cleaning";

  /* disable paired move if moving */
  if(isMoving){
    pairedMove.value = "false";
    pairedMove.disabled = true;
  } else {
    pairedMove.disabled = false;
  }

  /* show moving fields */
  if(isMoving || pairedMove.value === "true"){
    movingFields.style.display = "block";
  } else {
    movingFields.style.display = "none";
  }

  /* show cleaning fields */
  cleaningFields.style.display = isCleaning ? "block" : "none";
}

service.addEventListener("change", updateUI);
pairedMove.addEventListener("change", updateUI);

updateUI();

document.getElementById("quoteForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this).entries());

  const res = await fetch("https://n8n.srv1058135.hstgr.cloud/webhook/b9e8e2c9-6efd-40bf-abc1-32481d865cca", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  const r = result[0];

  resultBox.innerHTML = `
    <h3>Your Estimate</h3>
    <p><strong>Total:</strong> $${r.totalLow} - $${r.totalHigh}</p>
    <p><strong>Crew:</strong> ${r.crew}</p>
    <p><strong>Time:</strong> ${r.hoursMin} - ${r.hoursMax} hrs</p>
    <p><strong>Rate:</strong> $${r.rate}/hr</p>
    <p><strong>Travel Fee:</strong> $${r.travelFee}</p>
    <p><strong>Shrink Wrap:</strong> $${r.shrinkCost}</p>
  `;
});

</script>

</body>
</html>
